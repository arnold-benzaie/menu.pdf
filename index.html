<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AF & PIZZERIA</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }
        #viewer canvas {
            width: 100%;
            max-width: 100vw;
            height: auto;
            display: block;
        }
        #loading {
            color: #fff;
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="loading">Chargement du menu...</div>
    <div id="viewer"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <script>
        document.title = "AF & PIZZERIA";
        setInterval(function() {
            if (document.title !== "AF & PIZZERIA") document.title = "AF & PIZZERIA";
        }, 500);

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';

        async function renderPDF() {
            const loadingEl = document.getElementById('loading');
            const viewer = document.getElementById('viewer');
            try {
                const pdf = await pdfjsLib.getDocument('menu.pdf').promise;
                loadingEl.style.display = 'none';
                const screenWidth = Math.min(window.innerWidth, 1200);
                const dpr = window.devicePixelRatio || 1;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const baseViewport = page.getViewport({ scale: 1 });
                    const scale = (screenWidth / baseViewport.width) * dpr;
                    const viewport = page.getViewport({ scale: scale });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    viewer.appendChild(canvas);
                    await page.render({
                        canvasContext: canvas.getContext('2d'),
                        viewport: viewport
                    }).promise;
                }
            } catch (err) {
                loadingEl.textContent = 'Erreur : ' + err.message;
            }
        }
        renderPDF();
    </script>
</body>
</html>
