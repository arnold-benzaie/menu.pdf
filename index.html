<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AF & PIZZERIA</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #viewer canvas {
            width: 100%;
            max-width: 100vw;
            height: auto;
            display: block;
        }
        #status {
            color: #fff;
            text-align: center;
            padding: 60px 20px;
            font-size: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="status">Chargement du menu...</div>
    <div id="viewer"></div>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>
    <script>
        document.title = "AF & PIZZERIA";
        setInterval(function() {
            if (document.title !== "AF & PIZZERIA") document.title = "AF & PIZZERIA";
        }, 500);

        var statusEl = document.getElementById('status');
        var viewer = document.getElementById('viewer');

        if (typeof pdfjsLib === 'undefined') {
            statusEl.innerHTML = 'Erreur: librairie PDF non chargée.<br>Vérifie ta connexion.';
        } else {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js';

            pdfjsLib.getDocument('menu.pdf').promise.then(function(pdf) {
                statusEl.style.display = 'none';
                var screenWidth = Math.min(window.innerWidth, 1200);
                var dpr = window.devicePixelRatio || 1;

                function renderPage(pageNum) {
                    if (pageNum > pdf.numPages) return;
                    pdf.getPage(pageNum).then(function(page) {
                        var baseViewport = page.getViewport({ scale: 1 });
                        var scale = (screenWidth / baseViewport.width) * dpr;
                        var viewport = page.getViewport({ scale: scale });
                        var canvas = document.createElement('canvas');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        viewer.appendChild(canvas);
                        page.render({
                            canvasContext: canvas.getContext('2d'),
                            viewport: viewport
                        }).promise.then(function() {
                            renderPage(pageNum + 1);
                        });
                    });
                }
                renderPage(1);
            }).catch(function(err) {
                statusEl.innerHTML = 'Erreur: ' + err.message;
            });
        }
    </script>
</body>
</html>
